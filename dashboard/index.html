<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐋 Moby Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --fg: #c9d1d9; --fg2: #8b949e; --fg3: #484f58;
    --green: #3fb950; --red: #f85149; --blue: #58a6ff;
    --yellow: #d29922; --purple: #bc8cff; --cyan: #39d2c0;
    --border: #30363d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--fg); font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; }

  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header h1 span { font-size: 24px; }
  .header .meta { color: var(--fg2); font-size: 12px; }
  .refresh-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

  /* Summary Cards */
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card .label { color: var(--fg2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .card .value { font-size: 22px; font-weight: 700; }
  .card .sub { color: var(--fg2); font-size: 11px; margin-top: 4px; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }

  /* Strategy Cards */
  .strat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .strat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .strat-card .strat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .strat-card .strat-name { font-size: 15px; font-weight: 600; }
  .strat-card .strat-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--bg3); color: var(--fg2); }
  .strat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .strat-row:last-child { border-bottom: none; }
  .strat-row .k { color: var(--fg2); }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 20px; cursor: pointer; color: var(--fg2); border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Tables */
  .table-wrap { overflow-x: auto; margin-top: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: var(--bg3); color: var(--fg2); text-align: left; padding: 8px 10px; font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; position: sticky; top: 0; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:hover td { background: var(--bg3); }
  .section-title { font-size: 14px; font-weight: 600; margin: 20px 0 8px; color: var(--fg2); }

  /* Research Tab */
  .research-filters { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 16px; }
  .research-filters .filter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .research-filters .filter-row { display: flex; flex-direction: column; gap: 4px; }
  .research-filters label { color: var(--fg2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .research-filters .filter-val { color: var(--fg); font-size: 12px; font-weight: 600; }
  .research-filters .checkbox-row { display: flex; gap: 20px; margin-top: 12px; align-items: center; }
  .research-filters .checkbox-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; text-transform: none; font-size: 12px; color: var(--fg); }

  /* noUiSlider overrides */
  .noUi-target { background: var(--bg3); border: none; border-radius: 2px; height: 6px; box-shadow: none; }
  .noUi-connect { background: var(--blue); opacity: 0.5; }
  .noUi-handle { background: var(--blue); border: 2px solid var(--bg); border-radius: 50%; width: 18px !important; height: 18px !important; right: -9px !important; top: -7px !important; box-shadow: 0 0 4px rgba(0,0,0,0.4); cursor: pointer; }
  .noUi-handle::before, .noUi-handle::after { display: none; }
  .noUi-handle:hover { background: #79c0ff; }
  .noUi-horizontal { height: 6px; margin: 12px 0 6px; }
  .research-summary { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin: 16px 0; }

  /* Responsive */
  @media (max-width: 900px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .strat-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css">
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
</head>
<body>

<div class="header">
  <h1><span>🐋</span> Moby Dashboard</h1>
  <div class="meta">
    <label style="margin-right:16px;cursor:pointer;"><input type="checkbox" id="ivFilter" style="margin-right:4px;cursor:pointer;">Exclude IV &gt; 80%</label>
    <span class="refresh-dot"></span>Auto-refresh 30s &mdash; <span id="lastUpdate">—</span><span id="epochBadge"></span>
  </div>
</div>

<div class="container">
  <!-- Summary Cards -->
  <div class="summary-grid">
    <div class="card">
      <div class="label">Total P&L</div>
      <div class="value" id="combinedPnl">—</div>
      <div class="sub">Realized + Unrealized</div>
    </div>
    <div class="card">
      <div class="label">Realized P&L</div>
      <div class="value" id="totalPnl">—</div>
      <div class="sub" id="totalTrades">—</div>
    </div>
    <div class="card">
      <div class="label">Unrealized P&L</div>
      <div class="value" id="totalUnrealized">—</div>
      <div class="sub" id="openCount">—</div>
    </div>
    <div class="card">
      <div class="label">Win Rate</div>
      <div class="value" id="winRate">—</div>
      <div class="sub" id="winLoss">—</div>
    </div>
  </div>

  <!-- Strategy Summary Cards -->
  <div class="strat-grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="strat-card" id="flowCard"></div>
    <div class="strat-card" id="riptideCard"></div>
    <div class="strat-card" id="thetaCard"></div>
    <div class="strat-card" id="yoloCard"></div>
  </div>

  <!-- Position Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="flow">🐋 Flow</div>
    <div class="tab" data-tab="riptide">🌊 Riptide</div>
    <div class="tab" data-tab="theta">⏳ Theta</div>
    <div class="tab" data-tab="yolo">🎲 Yolo</div>
    <div class="tab" data-tab="log">📋 Trade Log</div>
    <div class="tab" data-tab="research">🔬 Research</div>
  </div>

  <div id="tab-flow" class="tab-content active"></div>
  <div id="tab-riptide" class="tab-content"></div>
  <div id="tab-theta" class="tab-content"></div>
  <div id="tab-yolo" class="tab-content"></div>
  <div id="tab-log" class="tab-content"></div>
  <div id="tab-research" class="tab-content"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const pnl = v => v >= 0 ? `$${v.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0})}` : `($${Math.abs(v).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0})})`;
const pnlClass = v => v >= 0 ? 'pos' : 'neg';
const pct = v => v !== null && v !== undefined ? `${v >= 0 ? '+' : ''}${v.toFixed(1)}%` : '—';

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    $(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

// IV filter — persist in localStorage, re-render on toggle
const ivCheckbox = $('ivFilter');
ivCheckbox.checked = localStorage.getItem('moby_iv_filter') === 'true';
ivCheckbox.addEventListener('change', () => {
  localStorage.setItem('moby_iv_filter', ivCheckbox.checked);
  refresh();
});

function filterByIv(positions) {
  if (!ivCheckbox.checked) return positions || [];
  return (positions || []).filter(p => !p.entryIv || p.entryIv <= 0.80);
}

function recomputeStats(open, closed) {
  let wins = 0, losses = 0, totalPnl = 0, unrealized = 0;
  for (const p of closed) {
    totalPnl += p.pnl || 0;
    if ((p.pnl || 0) > 0) wins++; else if ((p.pnl || 0) < 0) losses++;
  }
  for (const p of open) unrealized += p.unrealizedPnl || 0;
  return { totalPnl, wins, losses, totalTrades: closed.length, openCount: open.length, unrealized };
}

function renderStratCard(el, name, emoji, stats) {
  const wr = (stats.wins + stats.losses) > 0 ? ((stats.wins / (stats.wins + stats.losses)) * 100).toFixed(1) : '—';
  el.innerHTML = `
    <div class="strat-header">
      <span class="strat-name">${emoji} ${name}</span>
      <span class="strat-badge">${stats.openCount} open</span>
    </div>
    <div class="strat-row"><span class="k">Realized</span><span class="${pnlClass(stats.totalPnl)}">${pnl(stats.totalPnl)}</span></div>
    <div class="strat-row"><span class="k">Unrealized</span><span class="${pnlClass(stats.unrealized)}">${pnl(stats.unrealized)}</span></div>
    <div class="strat-row"><span class="k">Win Rate</span><span>${wr}%</span></div>
    <div class="strat-row"><span class="k">Trades</span><span>${stats.wins}W / ${stats.losses}L (${stats.totalTrades})</span></div>
  `;
}

function renderFlowTable(state) {
  let html = '';
  if (state.openPositions?.length) {
    html += `<div class="section-title">Open Positions (${state.openPositions.length})</div><div class="table-wrap"><table>
      <tr><th>Ticker</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Entry</th><th>Last</th><th>Ctrs</th><th>PnL</th><th>PnL%</th><th>IV</th><th>DP</th><th>ER Date</th><th>Held</th></tr>`;
    for (const p of state.openPositions) {
      const held = Math.round((Date.now() - new Date(p.entryDate).getTime()) / 86400000);
      const upnl = p.unrealizedPnl || 0;
      const upct = p.entryValue > 0 ? (upnl / p.entryValue * 100) : 0;
      const dpBadge = p.dpConfirmed ? '<span style="color:var(--cyan)" title="Dark pool confirmed">🏦</span>' : '—';
      html += `<tr>
        <td><strong>${p.ticker}</strong></td><td>${(p.type||'').toUpperCase()}</td><td>$${p.strike}</td><td>${p.expiry}</td>
        <td>$${p.entryPrice?.toFixed(2)}</td><td>$${(p.lastPrice||0).toFixed(2)}</td><td>${p.contracts}</td>
        <td class="${pnlClass(upnl)}">${pnl(upnl)}</td><td class="${pnlClass(upnl)}">${pct(upct)}</td>
        <td>${p.entryIv ? (p.entryIv*100).toFixed(0)+'%' : '—'}</td><td>${dpBadge}</td><td>${p.earningsDate||'—'}</td><td>${held}d</td>
      </tr>`;
    }
    html += '</table></div>';
  } else {
    html += '<div class="section-title">No open positions</div>';
  }

  if (state.closedPositions?.length) {
    html += `<div class="section-title">Closed Positions (${state.closedPositions.length})</div><div class="table-wrap"><table>
      <tr><th>Ticker</th><th>Type</th><th>Strike</th><th>Entry</th><th>Exit</th><th>Ctrs</th><th>PnL</th><th>PnL%</th><th>IV</th><th>Hold</th><th>Reason</th></tr>`;
    for (const p of [...state.closedPositions].reverse()) {
      html += `<tr>
        <td><strong>${p.ticker}</strong></td><td>${(p.type||'').toUpperCase()}</td><td>$${p.strike}</td>
        <td>$${p.entryPrice?.toFixed(2)}</td><td>$${p.exitPrice?.toFixed(2)}</td><td>${p.contracts}</td>
        <td class="${pnlClass(p.pnl)}">${pnl(p.pnl)}</td><td class="${pnlClass(p.pnlPct)}">${pct(p.pnlPct)}</td>
        <td>${p.entryIv ? (p.entryIv*100).toFixed(0)+'%' : '—'}</td><td>${p.holdDays}d</td>
        <td>${(p.exitReason||'').split(' ')[0]}</td>
      </tr>`;
    }
    html += '</table></div>';
  }
  $('tab-flow').innerHTML = html;
}

function riptideSpreadLabel(p) {
  const t = (p.type === 'call') ? 'C' : 'P';
  return `${p.strike}${t}/${p.protectionStrike}${t}`;
}

function renderRiptideTable(state) {
  let html = '';
  if (state.openPositions?.length) {
    html += `<div class="section-title">Open Positions (${state.openPositions.length})</div><div class="table-wrap"><table>
      <tr><th>Ticker</th><th>Type</th><th>Spread</th><th>Expiry</th><th>Credit</th><th>Cost</th><th>Ctrs</th><th>PnL</th><th>Max Risk</th><th>IV</th><th>IV Pctl</th><th>DP $</th><th>Held</th></tr>`;
    for (const p of state.openPositions) {
      const held = Math.round((Date.now() - new Date(p.entryDate).getTime()) / 86400000);
      const upnl = p.unrealizedPnl || 0;
      const typeLabel = (p.type === 'call') ? '<span style="color:var(--green)">CALL</span>' : '<span style="color:var(--red)">PUT</span>';
      const ivPctl = p.ivPctl ? `${(p.ivPctl*100).toFixed(0)}%` : '—';
      const dp = p.dpRecentNotional ? `$${(p.dpRecentNotional/1e6).toFixed(1)}M` : '—';
      html += `<tr>
        <td><strong>${p.ticker}</strong></td><td>${typeLabel}</td><td>${riptideSpreadLabel(p)}</td><td>${p.expiry}</td>
        <td>$${p.creditPerContract?.toFixed(2)}</td>
        <td>$${(p.currentSpreadCost||0).toFixed(2)}</td><td>${p.contracts}</td>
        <td class="${pnlClass(upnl)}">${pnl(upnl)}</td><td>${pnl(p.maxRisk||0)}</td>
        <td>${p.entryIv ? (p.entryIv*100).toFixed(0)+'%' : '—'}</td><td>${ivPctl}</td><td>${dp}</td><td>${held}d</td>
      </tr>`;
    }
    html += '</table></div>';
  } else {
    html += '<div class="section-title">No open positions — Riptide is scanning</div>';
  }

  if (state.closedPositions?.length) {
    html += `<div class="section-title">Closed Positions (${state.closedPositions.length})</div><div class="table-wrap"><table>
      <tr><th>Ticker</th><th>Type</th><th>Spread</th><th>Credit</th><th>Exit Cost</th><th>Ctrs</th><th>PnL</th><th>PnL%</th><th>IV</th><th>IV Pctl</th><th>Hold</th><th>Reason</th></tr>`;
    for (const p of [...state.closedPositions].reverse()) {
      const typeLabel = (p.type === 'call') ? '<span style="color:var(--green)">CALL</span>' : '<span style="color:var(--red)">PUT</span>';
      const ivPctl = p.ivPctl ? `${(p.ivPctl*100).toFixed(0)}%` : '—';
      html += `<tr>
        <td><strong>${p.ticker}</strong></td><td>${typeLabel}</td><td>${riptideSpreadLabel(p)}</td>
        <td>$${p.creditPerContract?.toFixed(2)}</td><td>$${(p.exitCostPerContract||0).toFixed(2)}</td>
        <td>${p.contracts}</td>
        <td class="${pnlClass(p.pnl)}">${pnl(p.pnl)}</td><td class="${pnlClass(p.pnlPct)}">${pct(p.pnlPct)}</td>
        <td>${p.entryIv ? (p.entryIv*100).toFixed(0)+'%' : '—'}</td><td>${ivPctl}</td>
        <td>${p.holdDays}d</td><td>${(p.exitReason||'').split(' ')[0]}</td>
      </tr>`;
    }
    html += '</table></div>';
  }
  $('tab-riptide').innerHTML = html;
}

function renderThetaTable(state) {
  let html = '';
  if (state.openPositions?.length) {
    html += `<div class="section-title">Open Positions (${state.openPositions.length})</div><div class="table-wrap"><table>
      <tr><th>Ticker</th><th>Structure</th><th>Expiry</th><th>Credit</th><th>Debit MTM</th><th>Ctrs</th><th>PnL</th><th>PnL%</th><th>IV Rank</th><th>Risk</th><th>ER Date</th><th>Held</th></tr>`;
    for (const p of state.openPositions) {
      const held = Math.round((Date.now() - new Date(p.entryDate).getTime()) / 86400000);
      const upnl = p.unrealizedPnl || 0;
      const upct = p.unrealizedPnlPct || 0;
      const struct = `${p.shortCall?.strike}C/${p.longCall?.strike}C | ${p.shortPut?.strike}P/${p.longPut?.strike}P`;
      html += `<tr>
        <td><strong>${p.ticker}</strong></td><td>${struct}</td><td>${p.expiry}</td>
        <td>$${p.credit?.toFixed(2)}</td><td>$${(p.exitDebitMtm||0).toFixed(2)}</td><td>${p.contracts}</td>
        <td class="${pnlClass(upnl)}">${pnl(upnl)}</td><td class="${pnlClass(upct)}">${pct(upct)}</td>
        <td>${p.ivRank ? (p.ivRank*100).toFixed(0)+'%' : '—'}</td><td>${pnl(p.totalRisk||0)}</td>
        <td>${p.earningsDate||'—'} ${p.erTime||''}</td><td>${held}d</td>
      </tr>`;
    }
    html += '</table></div>';
  } else {
    html += '<div class="section-title">No open positions</div>';
  }

  if (state.closedPositions?.length) {
    html += `<div class="section-title">Closed Positions (${state.closedPositions.length})</div><div class="table-wrap"><table>
      <tr><th>Ticker</th><th>Structure</th><th>Credit</th><th>Exit Debit</th><th>Ctrs</th><th>PnL</th><th>PnL%</th><th>IV Rank</th><th>Hold</th><th>Reason</th></tr>`;
    for (const p of [...state.closedPositions].reverse()) {
      const struct = `${p.shortCall?.strike}C/${p.longCall?.strike}C | ${p.shortPut?.strike}P/${p.longPut?.strike}P`;
      html += `<tr>
        <td><strong>${p.ticker}</strong></td><td>${struct}</td>
        <td>$${p.credit?.toFixed(2)}</td><td>$${(p.exitDebit||0).toFixed(2)}</td><td>${p.contracts}</td>
        <td class="${pnlClass(p.pnl)}">${pnl(p.pnl)}</td><td class="${pnlClass(p.pnlPct)}">${pct(p.pnlPct)}</td>
        <td>${p.ivRank ? (p.ivRank*100).toFixed(0)+'%' : '—'}</td><td>${p.holdDays}d</td>
        <td>${(p.exitReason||'').replace(/\(.*\)/, '').trim()}</td>
      </tr>`;
    }
    html += '</table></div>';
  }
  $('tab-theta').innerHTML = html;
}

function renderYoloTable(state) {
  let html = '';

  // Delta stats banner
  if (state.deltaStats) {
    const ds = state.deltaStats;
    const deltaColor = ds.avgDelta >= 0 ? 'neg' : 'pos'; // positive delta = overpaying = bad
    html += `<div class="card" style="margin-top:16px;margin-bottom:16px;border-color:var(--border)">
      <div class="label">Price Delta (Alert → Entry)</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:8px">
        <div><div class="label">Avg Δ</div><div class="${deltaColor}">$${ds.avgDelta.toFixed(2)} (${ds.avgDeltaPct >= 0 ? '+' : ''}${ds.avgDeltaPct.toFixed(1)}%)</div></div>
        <div><div class="label">Avg Delay</div><div>${ds.avgDelaySec.toFixed(0)}s</div></div>
        <div><div class="label">Total Slippage</div><div class="${ds.totalSlippage >= 0 ? 'neg' : 'pos'}">${pnl(ds.totalSlippage)}</div></div>
        <div><div class="label">Samples</div><div>${ds.samples}</div></div>
      </div>
    </div>`;
  }

  if (state.openPositions?.length) {
    html += `<div class="section-title">Open Positions (${state.openPositions.length})</div><div class="table-wrap"><table>
      <tr><th>Ticker</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Entry</th><th>Current</th><th>Ctrs</th><th>PnL</th><th>PnL%</th><th>IV</th><th>Δ Alert</th><th>Held</th><th>θ Exit</th></tr>`;
    for (const p of state.openPositions) {
      const held = Math.round((Date.now() - new Date(p.entryDate).getTime()) / 86400000);
      const upnl = p.unrealizedPnl || 0;
      const upct = p.entryPrice > 0 ? ((p.currentPrice || p.entryPrice) - p.entryPrice) / p.entryPrice * 100 : 0;
      const typeLabel = p.type === 'call' ? '<span style="color:var(--green)">CALL</span>' : '<span style="color:var(--red)">PUT</span>';
      const deltaStr = p.priceDelta !== null && p.priceDelta !== undefined
        ? `<span class="${p.priceDelta > 0 ? 'neg' : 'pos'}">$${p.priceDelta.toFixed(2)}</span>`
        : '—';
      html += `<tr>
        <td><strong>${p.ticker}</strong></td><td>${typeLabel}</td><td>$${p.strike}</td><td>${p.expiry}</td>
        <td>$${p.entryPrice?.toFixed(2)}</td><td>$${(p.currentPrice||p.entryPrice).toFixed(2)}</td>
        <td>${p.contracts}</td>
        <td class="${pnlClass(upnl)}">${pnl(upnl)}</td><td class="${pnlClass(upct)}">${pct(upct)}</td>
        <td>${p.entryIv ? (p.entryIv*100).toFixed(0)+'%' : '—'}</td><td>${deltaStr}</td>
        <td>${held}d</td><td>${p.thetaExitDate||'—'}</td>
      </tr>`;
    }
    html += '</table></div>';
  } else {
    html += '<div class="section-title">No open positions — Yolo is scanning</div>';
  }

  if (state.closedPositions?.length) {
    html += `<div class="section-title">Closed Positions (${state.closedPositions.length})</div><div class="table-wrap"><table>
      <tr><th>Ticker</th><th>Type</th><th>Strike</th><th>Entry</th><th>Exit</th><th>Ctrs</th><th>PnL</th><th>PnL%</th><th>IV</th><th>Δ Alert</th><th>Hold</th><th>Reason</th></tr>`;
    for (const p of [...state.closedPositions].reverse()) {
      const typeLabel = p.type === 'call' ? '<span style="color:var(--green)">CALL</span>' : '<span style="color:var(--red)">PUT</span>';
      const deltaStr = p.priceDelta !== null && p.priceDelta !== undefined
        ? `<span class="${p.priceDelta > 0 ? 'neg' : 'pos'}">$${p.priceDelta.toFixed(2)}</span>`
        : '—';
      html += `<tr>
        <td><strong>${p.ticker}</strong></td><td>${typeLabel}</td><td>$${p.strike}</td>
        <td>$${p.entryPrice?.toFixed(2)}</td><td>$${p.exitPrice?.toFixed(2)}</td><td>${p.contracts}</td>
        <td class="${pnlClass(p.pnl)}">${pnl(p.pnl)}</td><td class="${pnlClass(p.pnlPct)}">${pct(p.pnlPct)}</td>
        <td>${p.entryIv ? (p.entryIv*100).toFixed(0)+'%' : '—'}</td><td>${deltaStr}</td>
        <td>${p.holdDays}d</td><td>${(p.exitReason||'').split(' ')[0]}</td>
      </tr>`;
    }
    html += '</table></div>';
  }
  $('tab-yolo').innerHTML = html;
}

function fmtTs(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso.slice(0, 10);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${mm}/${dd} ${hh}:${mi}`;
}

function renderTradeLog(flow, riptide, theta, yolo) {
  const trades = [];
  for (const p of (flow?.closedPositions || [])) {
    trades.push({ openTime: p.entryTime || p.entryDate, closeTime: p.exitTime || p.exitDate, strat: '🐋 Flow', ticker: p.ticker, action: 'EXIT', detail: `${p.type?.toUpperCase()} $${p.strike}`, pnl: p.pnl, pnlPct: p.pnlPct, reason: (p.exitReason||'').split(' ')[0] });
  }
  for (const p of (riptide?.closedPositions || [])) {
    const rt = (p.type === 'call') ? 'C' : 'P';
    trades.push({ openTime: p.entryTime || p.entryDate, closeTime: p.exitTime || p.exitDate, strat: '🌊 Riptide', ticker: p.ticker, action: 'EXIT', detail: `${p.strike}${rt}/${p.protectionStrike}${rt} spread`, pnl: p.pnl, pnlPct: p.pnlPct, reason: (p.exitReason||'').split(' ')[0] });
  }
  for (const p of (theta?.closedPositions || [])) {
    trades.push({ openTime: p.entryTime || p.entryDate, closeTime: p.exitTime || p.exitDate, strat: '⏳ Theta', ticker: p.ticker, action: 'EXIT', detail: `IC ${p.shortCall?.strike}C/${p.shortPut?.strike}P`, pnl: p.pnl, pnlPct: p.pnlPct, reason: (p.exitReason||'').replace(/\(.*\)/, '').trim() });
  }
  for (const p of (yolo?.closedPositions || [])) {
    const t = p.type === 'call' ? 'C' : 'P';
    trades.push({ openTime: p.entryTime || p.entryDate, closeTime: p.exitTime || p.exitDate, strat: '🎲 Yolo', ticker: p.ticker, action: 'EXIT', detail: `${p.strike}${t} long`, pnl: p.pnl, pnlPct: p.pnlPct, reason: (p.exitReason||'').split(' ')[0] });
  }
  trades.sort((a, b) => (b.closeTime || '').localeCompare(a.closeTime || ''));

  let html = `<div class="section-title">All Closed Trades (${trades.length})</div><div class="table-wrap"><table>
    <tr><th>Opened</th><th>Closed</th><th>Strategy</th><th>Ticker</th><th>Detail</th><th>PnL</th><th>PnL%</th><th>Reason</th></tr>`;
  for (const t of trades) {
    html += `<tr>
      <td>${fmtTs(t.openTime)}</td><td>${fmtTs(t.closeTime)}</td><td>${t.strat}</td><td><strong>${t.ticker}</strong></td><td>${t.detail}</td>
      <td class="${pnlClass(t.pnl)}">${pnl(t.pnl)}</td><td class="${pnlClass(t.pnlPct)}">${pct(t.pnlPct)}</td>
      <td>${t.reason}</td>
    </tr>`;
  }
  html += '</table></div>';
  $('tab-log').innerHTML = html;
}

// ═══════════════════════════════════════════════
// RESEARCH TAB
// ═══════════════════════════════════════════════
let researchData = null;
let researchLoaded = false;

const RESEARCH_DEFAULTS = {
  premiumMin: 0, premiumMax: 10000000,
  volOiMin: 0, volOiMax: 200,
  ivMin: 0, ivMax: 500,
  dteMin: 0, dteMax: 730,
  otmMin: 0, otmMax: 100,
  requireEarnings: false, excludeIndexes: true, sweepsOnly: false,
};

function getResearchFilters() {
  const get = (k, def) => {
    const v = localStorage.getItem('research_' + k);
    return v !== null ? (typeof def === 'boolean' ? v === 'true' : parseFloat(v)) : def;
  };
  const f = {};
  for (const [k, def] of Object.entries(RESEARCH_DEFAULTS)) {
    f[k] = get(k, def);
  }
  return f;
}

function setResearchFilter(k, v) {
  localStorage.setItem('research_' + k, v);
}

function filterResearchAlerts(alerts, f) {
  return alerts.filter(a => {
    if (a.premium < f.premiumMin || a.premium > f.premiumMax) return false;
    if (a.volOi < f.volOiMin || a.volOi > f.volOiMax) return false;
    const ivPct = a.iv * 100;
    if (ivPct < f.ivMin || ivPct > f.ivMax) return false;
    if (a.dte < f.dteMin || a.dte > f.dteMax) return false;
    if (a.otmPct < f.otmMin || a.otmPct > f.otmMax) return false;
    if (f.requireEarnings && !a.hasEarnings) return false;
    if (f.excludeIndexes && a.isIndex) return false;
    if (f.sweepsOnly && !a.isSweep) return false;
    return true;
  });
}

function renderResearchTab() {
  if (!researchData) {
    $('tab-research').innerHTML = '<div class="section-title">Loading research data...</div>';
    return;
  }
  const f = getResearchFilters();
  const allAlerts = researchData.alerts || [];
  const filtered = filterResearchAlerts(allAlerts, f);

  // Compute summary stats (only alerts with PnL data)
  const withPnl = filtered.filter(a => a.simulatedPnl !== null);
  const totalPnlVal = withPnl.reduce((s, a) => s + a.simulatedPnl, 0);
  const wins = withPnl.filter(a => a.simulatedPnl > 0).length;
  const losses = withPnl.filter(a => a.simulatedPnl <= 0).length;
  const winRate = withPnl.length > 0 ? (wins / withPnl.length * 100).toFixed(1) : '—';
  const avgPnl = withPnl.length > 0 ? totalPnlVal / withPnl.length : 0;

  // Build filters HTML
  const fmtK = v => v >= 1000000 ? '$' + (v/1000000).toFixed(1) + 'M' : v >= 1000 ? '$' + (v/1000).toFixed(0) + 'K' : '$' + v;
  const fmtPct = v => v + '%';

  const sliders = [
    { label: 'Premium', keyMin: 'premiumMin', keyMax: 'premiumMax', min: 0, max: 10000000, step: 50000, fmt: fmtK },
    { label: 'Vol/OI', keyMin: 'volOiMin', keyMax: 'volOiMax', min: 0, max: 200, step: 1, fmt: v => parseFloat(v).toFixed(1) },
    { label: 'IV', keyMin: 'ivMin', keyMax: 'ivMax', min: 0, max: 500, step: 5, fmt: fmtPct },
    { label: 'DTE', keyMin: 'dteMin', keyMax: 'dteMax', min: 0, max: 730, step: 1, fmt: v => Math.round(v) },
    { label: 'OTM%', keyMin: 'otmMin', keyMax: 'otmMax', min: 0, max: 100, step: 1, fmt: fmtPct },
  ];

  let html = `<div class="research-filters">
    <div class="filter-grid">`;
  for (const s of sliders) {
    const lo = f[s.keyMin];
    const hi = f[s.keyMax];
    html += `<div class="filter-row">
        <label>${s.label}: <span class="filter-val" id="rv-${s.keyMin}">${s.fmt(lo)}</span> — <span class="filter-val" id="rv-${s.keyMax}">${s.fmt(hi)}</span></label>
        <div id="slider-${s.keyMin}" style="margin:12px 0 6px;"></div>
      </div>`;
  }
  html += `</div>
    <div class="checkbox-row">
      <label><input type="checkbox" id="rf-requireEarnings" ${f.requireEarnings ? 'checked' : ''}> Require Earnings</label>
      <label><input type="checkbox" id="rf-excludeIndexes" ${f.excludeIndexes ? 'checked' : ''}> Exclude Indexes</label>
      <label><input type="checkbox" id="rf-sweepsOnly" ${f.sweepsOnly ? 'checked' : ''}> Sweeps Only</label>
    </div>
  </div>`;

  // Summary cards
  html += `<div class="research-summary">
    <div class="card"><div class="label">Alerts Passing</div><div class="value">${filtered.length} <span style="color:var(--fg2);font-size:13px">/ ${allAlerts.length}</span></div></div>
    <div class="card"><div class="label">Simulated Trades</div><div class="value">${withPnl.length}</div></div>
    <div class="card"><div class="label">Total PnL</div><div class="value ${pnlClass(totalPnlVal)}">${pnl(totalPnlVal)}</div></div>
    <div class="card"><div class="label">Win Rate</div><div class="value">${winRate}%</div><div class="sub">${wins}W / ${losses}L</div></div>
    <div class="card"><div class="label">Avg PnL/Trade</div><div class="value ${pnlClass(avgPnl)}">${pnl(avgPnl)}</div></div>
  </div>`;

  // Results table sorted by PnL
  const sorted = [...filtered].sort((a, b) => (b.simulatedPnl || 0) - (a.simulatedPnl || 0));
  html += `<div class="section-title">Results (${sorted.length})</div><div class="table-wrap"><table>
    <tr><th>Ticker</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Alert Time</th><th>Entry</th><th>Last/Exit</th><th>PnL</th><th>PnL%</th><th>Premium</th><th>Vol/OI</th><th>IV</th><th>DTE</th><th>OTM%</th><th>ER</th><th>Status</th></tr>`;
  for (const a of sorted.slice(0, 500)) {
    const entryStr = a.entryAsk > 0 ? `$${a.entryAsk.toFixed(2)}` : '—';
    const lastStr = a.lastPrice !== null ? `$${a.lastPrice.toFixed(2)}` : '—';
    const pnlStr = a.simulatedPnl !== null ? pnl(a.simulatedPnl) : '—';
    const pnlPctStr = a.simulatedPnlPct !== null ? pct(a.simulatedPnlPct) : '—';
    const pnlCls = a.simulatedPnl !== null ? pnlClass(a.simulatedPnl) : '';
    const premStr = a.premium >= 1000 ? '$' + (a.premium/1000).toFixed(0) + 'K' : '$' + a.premium.toFixed(0);
    const statusBadge = a.status === 'expired' ? '<span style="color:var(--fg3)">expired</span>' : a.status === 'active' ? '<span style="color:var(--green)">active</span>' : '<span style="color:var(--fg3)">—</span>';
    const yahooUrl = a.optionSymbol ? `https://finance.yahoo.com/quote/${a.optionSymbol}/` : `https://finance.yahoo.com/quote/${a.ticker}/`;
    const alertTimeStr = a.alertTime ? fmtTs(a.alertTime) : a.alertDate || '—';
    html += `<tr>
      <td><a href="${yahooUrl}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none;font-weight:600;">${a.ticker}</a></td>
      <td>${(a.type||'').toUpperCase()}</td>
      <td>$${a.strike}</td>
      <td>${a.expiry}</td>
      <td>${alertTimeStr}</td>
      <td>${entryStr}</td>
      <td>${lastStr}</td>
      <td class="${pnlCls}">${pnlStr}</td>
      <td class="${pnlCls}">${pnlPctStr}</td>
      <td>${premStr}</td>
      <td>${a.volOi.toFixed(1)}</td>
      <td>${(a.iv * 100).toFixed(0)}%</td>
      <td>${a.dte}</td>
      <td>${a.otmPct.toFixed(1)}%</td>
      <td>${a.hasEarnings ? a.earningsDate : '—'}</td>
      <td>${statusBadge}</td>
    </tr>`;
  }
  if (sorted.length > 500) html += `<tr><td colspan="16" style="text-align:center;color:var(--fg2)">Showing 500 of ${sorted.length} results</td></tr>`;
  html += '</table></div>';

  $('tab-research').innerHTML = html;

  // Create noUiSlider instances
  for (const s of sliders) {
    const el = document.getElementById('slider-' + s.keyMin);
    if (!el || el.noUiSlider) continue;
    noUiSlider.create(el, {
      start: [f[s.keyMin], f[s.keyMax]],
      connect: true,
      range: { min: s.min, max: s.max },
      step: s.step,
    });
    el.noUiSlider.on('update', (values) => {
      const lo = parseFloat(values[0]);
      const hi = parseFloat(values[1]);
      const loEl = document.getElementById('rv-' + s.keyMin);
      const hiEl = document.getElementById('rv-' + s.keyMax);
      if (loEl) loEl.textContent = s.fmt(lo);
      if (hiEl) hiEl.textContent = s.fmt(hi);
    });
    el.noUiSlider.on('change', (values) => {
      setResearchFilter(s.keyMin, parseFloat(values[0]));
      setResearchFilter(s.keyMax, parseFloat(values[1]));
      renderResearchTab();
    });
  }

  const checks = ['requireEarnings', 'excludeIndexes', 'sweepsOnly'];
  for (const key of checks) {
    const el = document.getElementById('rf-' + key);
    if (el) {
      el.addEventListener('change', () => {
        setResearchFilter(key, el.checked);
        renderResearchTab();
      });
    }
  }
}

async function loadResearchData() {
  try {
    researchData = await fetch('/api/research').then(r => r.json());
    researchLoaded = true;
    renderResearchTab();
  } catch (e) {
    console.error('Research load failed:', e);
  }
}

// Load research data on first tab click (lazy load)
document.querySelector('[data-tab="research"]').addEventListener('click', () => {
  if (!researchLoaded) loadResearchData();
  else renderResearchTab();
});

async function refresh() {
  try {
    const [summary, flow, riptide, theta, yolo] = await Promise.all([
      fetch('/api/summary').then(r => r.json()),
      fetch('/api/flow').then(r => r.json()),
      fetch('/api/riptide').then(r => r.json()),
      fetch('/api/theta').then(r => r.json()),
      fetch('/api/yolo').then(r => r.json()),
    ]);

    // Apply IV filter to all strategies
    flow.openPositions = filterByIv(flow.openPositions);
    flow.closedPositions = filterByIv(flow.closedPositions);
    riptide.openPositions = filterByIv(riptide.openPositions);
    riptide.closedPositions = filterByIv(riptide.closedPositions);
    theta.openPositions = filterByIv(theta.openPositions);
    theta.closedPositions = filterByIv(theta.closedPositions);
    yolo.openPositions = filterByIv(yolo.openPositions);
    yolo.closedPositions = filterByIv(yolo.closedPositions);

    // Recompute stats from filtered data
    const flowStats = recomputeStats(flow.openPositions, flow.closedPositions);
    const riptideStats = recomputeStats(riptide.openPositions, riptide.closedPositions);
    const thetaStats = recomputeStats(theta.openPositions, theta.closedPositions);
    const yoloStats = recomputeStats(yolo.openPositions, yolo.closedPositions);

    const c = {
      totalPnl: flowStats.totalPnl + riptideStats.totalPnl + thetaStats.totalPnl + yoloStats.totalPnl,
      totalUnrealized: flowStats.unrealized + riptideStats.unrealized + thetaStats.unrealized + yoloStats.unrealized,
      totalTrades: flowStats.totalTrades + riptideStats.totalTrades + thetaStats.totalTrades + yoloStats.totalTrades,
      openPositions: flowStats.openCount + riptideStats.openCount + thetaStats.openCount + yoloStats.openCount,
      wins: flowStats.wins + riptideStats.wins + thetaStats.wins + yoloStats.wins,
      losses: flowStats.losses + riptideStats.losses + thetaStats.losses + yoloStats.losses,
    };

    $('totalPnl').className = `value ${pnlClass(c.totalPnl)}`;
    $('totalPnl').textContent = pnl(c.totalPnl);
    $('totalTrades').textContent = `${c.totalTrades} closed trades`;

    $('totalUnrealized').className = `value ${pnlClass(c.totalUnrealized)}`;
    $('totalUnrealized').textContent = pnl(c.totalUnrealized);
    $('openCount').textContent = `${c.openPositions} open positions`;

    const wr = (c.wins + c.losses) > 0 ? ((c.wins / (c.wins + c.losses)) * 100).toFixed(1) : '—';
    $('winRate').textContent = `${wr}%`;
    $('winLoss').textContent = `${c.wins}W / ${c.losses}L`;

    const combined = c.totalPnl + c.totalUnrealized;
    $('combinedPnl').className = `value ${pnlClass(combined)}`;
    $('combinedPnl').textContent = pnl(combined);

    renderStratCard($('flowCard'), 'Flow', '🐋', flowStats);
    renderStratCard($('riptideCard'), 'Riptide', '🌊', riptideStats);
    renderStratCard($('thetaCard'), 'Theta', '⏳', thetaStats);
    renderStratCard($('yoloCard'), 'Yolo', '🎲', yoloStats);

    renderFlowTable(flow);
    renderRiptideTable(riptide);
    renderThetaTable(theta);
    renderYoloTable(yolo);
    renderTradeLog(flow, riptide, theta, yolo);

    $('lastUpdate').textContent = new Date().toLocaleTimeString();
    if (summary.epoch) {
      $('epochBadge').innerHTML = ` &mdash; <span style="color:var(--yellow)">📌 Epoch: ${summary.epoch}</span>`;
    }
  } catch (e) {
    console.error('Refresh failed:', e);
  }
}

refresh();
setInterval(refresh, 30000);
</script>
